    const enc=new TextEncoder();
    const dec=new TextDecoder();
    function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
    async function decrypt(password){
      const material=await crypto.subtle.importKey("raw",enc.encode(password),"PBKDF2",false,["deriveKey"]);
      const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(payload.salt),iterations:210000,hash:"SHA-256"},material,{name:"AES-GCM",length:256},false,["decrypt"]);
      const bytes=b64(payload.data);
      return dec.decode(await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(payload.iv),tagLength:128},key,bytes));
    }
    document.getElementById("gate").addEventListener("submit",async event=>{

      const button=document.getElementById("unlock");
      const error=document.getElementById("error");
      button.disabled=true;error.textContent="";
      try{
        const html=await decrypt(document.getElementById("password").value);
