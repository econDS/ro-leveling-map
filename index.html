    const storageKey="ro-general-map-exp-tool-password";
    const enc=new TextEncoder();
    const dec=new TextDecoder();
    function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
    async function decrypt(password){
      const material=await crypto.subtle.importKey("raw",enc.encode(password),"PBKDF2",false,["deriveKey"]);
      const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(payload.salt),iterations:210000,hash:"SHA-256"},material,{name:"AES-GCM",length:256},false,["decrypt"]);
      const bytes=b64(payload.data);
      return dec.decode(await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(payload.iv),tagLength:128},key,bytes));
    }
    async function unlock(password, remember){
      const html=await decrypt(password);
      if(remember)localStorage.setItem(storageKey,password);else localStorage.removeItem(storageKey);
      document.open();document.write(html);document.close();
    }
    document.getElementById("gate").addEventListener("submit",async event=>{
      event.preventDefault();
      const button=document.getElementById("unlock");
      const error=document.getElementById("error");
      button.disabled=true;error.textContent="";
      try{
        await unlock(document.getElementById("password").value,document.getElementById("remember").checked);
      }catch(e){
        error.textContent="รหัสผ่านไม่ถูกต้อง";
        localStorage.removeItem(storageKey);
        button.disabled=false;
      }
    });
    const saved=localStorage.getItem(storageKey);
    if(saved){
      document.getElementById("password").value=saved;
      document.getElementById("unlock").disabled=true;
      unlock(saved,true).catch(()=>{localStorage.removeItem(storageKey);document.getElementById("unlock").disabled=false;});
    }
